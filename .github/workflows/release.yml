name: Make a Release

on: 
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
      - name: Setup goreleaser
        run: |-
          VERSION=v2.15.2
          GORELEASER_CHECKSUM_x86_64="5a0504a3be175fad742a5d00f77afb6281e4aa1edd3575005d6128a0f3445b92"
          OS="linux"
          if [[ ${RUNNER_OS} != "Linux" ]]; then
              echo "Unsupported OS: ${RUNNER_OS}"
              exit 1
          fi

          ARCH=$(uname -m)
          if [[ $(uname -m) == "aarch64" ]]; then
              ARCH=arm64
          fi

          FILE="goreleaser_${OS}_${ARCH}.tar.gz"

          echo "Installing ${FILE}"
          curl -LO "https://github.com/goreleaser/goreleaser/releases/download/${VERSION}/${FILE}"
          echo "${FILE} ${CHECKSUM}" | sha256sum -c
          tar -xf "${FILE}" goreleaser

          if sudo -l &> /dev/null; then
            sudo install -m 755 slsactl /usr/local/bin/goreleaser
          else
            install -m 755 slsactl /usr/local/bin/goreleaser
          fi
          rm -f "${FILE}" goreleaser
        shell: bash
      - name: Run goreleaser
        shell: bash
        run: goreleaser release
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
