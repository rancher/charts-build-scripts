name: Make a Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    container: registry.suse.com/bci/bci-base:16.1
    steps:
      - name: setup path
        shell: bash
        run: echo "PATH=$PATH" >> $GITHUB_PATH
      - name: install dependencies
        shell: bash
        run: zypper --non-interactive install git jq
      - name: install gh
        shell: bash
        env:
          # renovate: datasource=github-release-attachments depName=cli/cli
          GH_CLI_VERSION: v2.93.0
          # renovate: datasource=github-release-attachments depName=cli/cli digestVersion=v2.93.0
          GH_CLI_SUM_amd64: 02d1290eba130e0b896f3709ffff22e1c75a51475ddb70476a85abc6b5807af0
        run: |
          mkdir -p /tmp/gh
          GH_VERSION=${GH_CLI_VERSION#v}
          curl -fsL https://github.com/cli/cli/releases/download/${GH_CLI_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz -o /tmp/gh.tar.gz && \
            echo "${GH_CLI_SUM_amd64}  /tmp/gh.tar.gz" | sha256sum -c - && \
            tar -xf /tmp/gh.tar.gz --strip-components=1 -C /tmp/gh && \
            install -m 755 /tmp/gh/bin/gh /usr/local/bin/gh
      - name: Git safe directory
        run: git config --global --add safe.directory "$PWD"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
      - name: Setup goreleaser
        shell: bash
        run: |-
          # renovate-local: goreleaser-x86_64
          GORELEASER_VERSION="v2.16.0"
          # renovate-local: goreleaser-x86_64=v2.16.0
          GORELEASER_CHECKSUM_x86_64="eaae05b5eba07533bd0f06846b68c808399504784df00c62eb219541fc04e5e2"
          OS="Linux"
          if [[ ${RUNNER_OS} != "Linux" ]]; then
          	echo "Unsupported OS: ${RUNNER_OS}"
          	exit 1
          fi

          ARCH=$(uname -m)
          CHECKSUM="${GORELEASER_CHECKSUM_x86_64}"
          if [[ "${ARCH}" != "x86_64" ]]; then
          	echo "Unsupported architecture: ${ARCH}"
          	exit 1
          fi

          FILE="goreleaser_${OS}_${ARCH}.tar.gz"

          echo "Installing ${FILE}"
          curl -LO "https://github.com/goreleaser/goreleaser/releases/download/${GORELEASER_VERSION}/${FILE}"
          echo "${CHECKSUM} ${FILE}" | sha256sum -c
          tar -xf "${FILE}" goreleaser

          install -m 755 goreleaser /usr/local/bin/goreleaser
          rm -f "${FILE}" goreleaser
      - name: Run goreleaser
        id: goreleaser
        shell: bash
        run: |-
          goreleaser release --draft
          if [[ ! -f dist/metadata.json ]] || [[ ! -s dist/metadata.json ]]; then
            echo "Missing required file: dist/metadata.json"
            exit 1
          fi
          if [[ ! -f dist/artifacts.json ]] || [[ ! -s dist/artifacts.json ]]; then
            echo "Missing required file: dist/artifacts.json"
            exit 1
          fi
          echo "metadata=$(tr -d '\n\r' < dist/metadata.json)" >> "${GITHUB_OUTPUT}"
          echo "artifacts=$(tr -d '\n\r' < dist/artifacts.json)" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
